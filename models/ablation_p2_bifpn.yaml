# Ablation variant: YOLO11s + P2 head + BiFPN (no EMA)

nc: 80
scales:
  s: [0.50, 0.50, 1024]

backbone:
  - [-1, 1, Conv, [64, 3, 2]]           # 0
  - [-1, 1, Conv, [128, 3, 2]]          # 1
  - [-1, 2, C3k2, [256, False, 0.25]]   # 2
  - [-1, 1, Conv, [256, 3, 2]]          # 3
  - [-1, 2, C3k2, [512, False, 0.25]]   # 4
  - [-1, 1, Conv, [512, 3, 2]]          # 5
  - [-1, 2, C3k2, [512, True]]          # 6
  - [-1, 1, Conv, [1024, 3, 2]]         # 7
  - [-1, 2, C3k2, [1024, True]]         # 8
  - [-1, 1, SPPF, [1024, 5]]            # 9
  - [-1, 2, C2PSA, [1024]]              # 10

head:
  - [-1, 1, nn.Upsample, [None, 2, "nearest"]]
  - [[-1, 6], 1, BiFPN_Concat, [1]]
  - [-1, 2, C3k2, [512, False]]         # 13

  - [-1, 1, nn.Upsample, [None, 2, "nearest"]]
  - [[-1, 4], 1, BiFPN_Concat, [1]]
  - [-1, 2, C3k2, [256, False]]         # 16

  - [-1, 1, nn.Upsample, [None, 2, "nearest"]]
  - [[-1, 2], 1, BiFPN_Concat, [1]]
  - [-1, 2, C3k2, [128, False]]         # 19 - P2/4

  - [-1, 1, Conv, [128, 3, 2]]
  - [[-1, 16], 1, BiFPN_Concat, [1]]
  - [-1, 2, C3k2, [256, False]]         # 22

  - [-1, 1, Conv, [256, 3, 2]]
  - [[-1, 13], 1, BiFPN_Concat, [1]]
  - [-1, 2, C3k2, [512, False]]         # 25

  - [-1, 1, Conv, [512, 3, 2]]
  - [[-1, 10], 1, BiFPN_Concat, [1]]
  - [-1, 2, C3k2, [1024, True]]         # 28

  - [[19, 22, 25, 28], 1, Detect, [nc]]  # Detect(P2, P3, P4, P5)
